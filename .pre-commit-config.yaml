repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        types: [python]
        exclude: ^(tests/|web/backend/tests/|web/frontend/)

  - repo: https://github.com/pre-commit/mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-beautifulsoup4]
        args: [--config-file, pyproject.toml]
        exclude: ^tests/

  - repo: local
    hooks:
      - id: python-modularity-check
        name: python-modularity-check
        entry: python3 tools/check_modularity.py --warn-lines 500 --fail-lines 700 --warn-funcs 15 --warn-classes 4
        language: system
        files: ^(?!tests/|web/backend/tests/).*\.py$
        pass_filenames: true
